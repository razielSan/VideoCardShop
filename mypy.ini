[mypy]
python_version = 3.8
mypy_path = src
explicit_package_bases = True
disable_error_code = misc

strict = True

no_implicit_optional = True  
ignore_missing_imports = True 
warn_unreachable = True 
strict_equality = True 
warn_unused_ignores = True
show_error_codes = True

[mypy-tests.*]
ignore_errors = True

[mypy-redis]
ignore_missing_imports = True
